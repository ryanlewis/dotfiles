onboarding = false

[ui.toast]
delivery = "herdr"

[ui]
show_agent_labels_on_pane_borders = true
agent_panel_scope = "all"

[theme]
name = "vesper"

[ui.sound]
enabled = true

[keys]
prefix = "ctrl+a"

# Open lazygit in a temporary pane (closes when lazygit exits)
[[keys.command]]
key = "prefix+alt+g"
type = "pane"
command = "lazygit"
description = "lazygit"

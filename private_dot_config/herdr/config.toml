onboarding = false

[ui.toast]
delivery = "herdr"

[ui]
show_agent_labels_on_pane_borders = true
agent_panel_scope = "all"

[theme]
name = "catppuccin"

[ui.sound]
enabled = true

[keys]
prefix = "ctrl+a"

# Workspaces own the number row (prefix = ctrl+a):
#   prefix + 1..9       -> jump straight to workspace N
#   ctrl+shift + k / j  -> previous / next workspace = up / down the vertical
#                          workspace stack (prefix-free)
# (Shift+number doesn't survive the terminal layer, so workspaces take the bare
#  digits; prefix + w still opens the workspace picker.)
#
# Mnemonic: ctrl+hjkl moves between PANES; ctrl+shift+j/k moves between
# WORKSPACES (down/up the stack). ctrl+shift is the sweet spot -- neither
# modifier is remapped, so it's a clean left-hand chord AND left-Option compose
# (Opt+3 = #) is preserved, unlike ctrl+alt (which would need
# macos-option-as-alt = both). ctrl+shift+j stays distinct from the ctrl+j pane
# bind because herdr negotiates the Kitty keyboard protocol (crossterm
# PushKeyboardEnhancementFlags): ctrl+j already arrives as a CSI-u sequence and
# the shift modifier rides along. Verified distinct in practice.
switch_workspace = "prefix+1..9"
previous_workspace = "ctrl+shift+k"
next_workspace = "ctrl+shift+j"

# Tabs gave up the number row, so they cycle on n / p:
#   prefix + p -> previous tab
#   prefix + n -> next tab
#   prefix + , -> rename tab
switch_tab = ""
previous_tab = "prefix+p"
next_tab = "prefix+n"
rename_tab = "prefix+,"

# Direct (prefix-free) vim-style pane focus on ctrl+h/j/k/l. These are global
# binds, so herdr swallows the chord before the focused app sees it — chosen
# because the collisions are cheap here:
#   ctrl+h  backspace  -> real Backspace sends ^? (DEL), so it still works
#   ctrl+j  LF/newline -> Claude Code newline is Shift+Enter for us, not ctrl+j
#                         (universal fallback if ever needed: \ + Enter)
#   ctrl+k  unbound in both Claude Code and our zsh (self-insert) -> free
#   ctrl+l  clear/redraw -> minor; `clear` / Claude Code redraw is cosmetic
# (prefix+h/j/k/l no longer focuses panes; the navigate/resize modes still do.)
focus_pane_left = "ctrl+h"
focus_pane_down = "ctrl+j"
focus_pane_up = "ctrl+k"
focus_pane_right = "ctrl+l"

# Open lazygit in a temporary pane (closes when lazygit exits)
[[keys.command]]
key = "prefix+alt+g"
type = "pane"
command = "lazygit"
description = "lazygit"

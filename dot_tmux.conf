# ╭─────────────────────────────────────────────────────────╮
# │               tmux config — no frameworks               │
# │          Requires: tmux 3.5+, Ghostty, Nerd Font        │
# ╰─────────────────────────────────────────────────────────╯

# ─────────────────────── Terminal ────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:Tc:hyperlinks"

# Extended keys (CSI u) so Shift+Enter etc. work in apps like Claude Code
set -g extended-keys on
if-shell "tmux -V | awk '{if ($2+0 >= 3.5) exit 0; else exit 1}'" \
  "set -g extended-keys-format csi-u"
set -as terminal-features 'xterm-ghostty:extkeys'

# ─────────────────────── General ─────────────────────────
set -g mouse on
set -g set-clipboard on
set -g allow-passthrough on
set -g focus-events on
set -g history-limit 50000
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename on
set -g automatic-rename-format '#(~/.config/tmux/window-name.sh "#{pane_current_command}" "#{pane_current_path}")'

# ─────────────────────── Prefix ──────────────────────────
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ──────────────────── Vi Copy Mode ───────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# ──────────────── Prefix Keybindings ─────────────────────
# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Splits (inherit working directory)
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Reload config
bind r source-file ~/.tmux.conf \; display 'Config reloaded'

# ────────────── Prefixless Shortcuts (Ctrl+Alt) ──────────
# Pane navigation (hjkl and arrows)
bind -n C-M-h select-pane -L
bind -n C-M-j select-pane -D
bind -n C-M-k select-pane -U
bind -n C-M-l select-pane -R
# Pane resizing (arrows)
bind -n C-M-Left resize-pane -L 5
bind -n C-M-Down resize-pane -D 5
bind -n C-M-Up resize-pane -U 5
bind -n C-M-Right resize-pane -R 5

# Window navigation
bind -n C-M-p previous-window
bind -n C-M-n next-window
# Pane navigation (Alt+Shift+hjkl and arrows)
bind -n M-H select-pane -L
bind -n M-J select-pane -D
bind -n M-K select-pane -U
bind -n M-L select-pane -R
bind -n S-M-Left select-pane -L
bind -n S-M-Down select-pane -D
bind -n S-M-Up select-pane -U
bind -n S-M-Right select-pane -R
# Window navigation (Alt+Shift+[/])
bind -n 'M-{' previous-window
bind -n 'M-}' next-window
bind -n C-M-c new-window -c '#{pane_current_path}'

# Direct window access (Alt+Shift+N)
bind -n M-! select-window -t 1
bind -n M-@ select-window -t 2
bind -n 'M-#' select-window -t 3
bind -n 'M-$' select-window -t 4
bind -n M-% select-window -t 5
bind -n M-^ select-window -t 6
bind -n M-& select-window -t 7
bind -n M-* select-window -t 8
bind -n 'M-(' select-window -t 9

# Window reordering
bind -r "<" swap-window -t -1\; select-window -t -1
bind -r ">" swap-window -t +1\; select-window -t +1

# Pane zoom toggle
bind -n C-M-z resize-pane -Z

# Session picker
bind -n C-M-s choose-tree -Zs

# Popup terminal
bind -n C-M-g display-popup -E -w 80% -h 80%

# ──────────────── Mobile / Terminus ──────────────────────
# Ctrl+_ to Shift+Tab (Terminus on iPhone with Claude Code)
bind-key -n C-_ send-keys BTab

# ╭─────────────────────────────────────────────────────────╮
# │                   Status Bar — Dracula                   │
# ╰─────────────────────────────────────────────────────────╯

set -g status-position top
set -g status-interval 5
set -g status-justify left

# Colours (transparent background for floating pill effect)
set -g status-style 'bg=default,fg=#f8f8f2'
set -g status-left-length 30
set -g status-right-length 60

# Left: session name (switches to red PREFIX indicator when prefix is held)
set -g status-left '#{?client_prefix,#[fg=#282a36]#[bg=#ff5555]#[bold] PREFIX #[fg=#ff5555]#[bg=default] ,#[fg=#282a36]#[bg=#bd93f9]#[bold] #S #[fg=#bd93f9]#[bg=default] }'

# Right: prefix hint + clock
set -g status-right '#{?window_zoomed_flag,#[fg=#f1fa8c]  ,}#[fg=#6272a4,bg=default]#[fg=#f8f8f2,bg=#6272a4] %H:%M '

# Window tabs (rounded pill style)
set -g window-status-separator ''
setw -g window-status-format '#[fg=#6272a4,bg=default]#[fg=#282a36,bg=#6272a4]#I #[fg=#6272a4,bg=#44475a]#[fg=#f8f8f2,bg=#44475a] #W #[fg=#44475a,bg=default] '
setw -g window-status-current-format '#[fg=#50fa7b]#[bg=default]#[fg=#282a36]#[bg=#50fa7b]#[bold]#I #{?#(~/.config/tmux/window-name.sh label "#{pane_current_command}"),#[fg=#50fa7b]#[bg=#6272a4]#[fg=#f8f8f2]#[bg=#6272a4]#[bold] #(~/.config/tmux/window-name.sh label "#{pane_current_command}") #[fg=#6272a4]#[bg=#44475a],#[fg=#50fa7b]#[bg=#44475a]}#[fg=#f8f8f2]#[bg=#44475a]#[nobold] #(~/.config/tmux/window-name.sh path "#{pane_current_command}" "#{pane_current_path}") #[fg=#44475a]#[bg=default] '
setw -g window-status-activity-style 'fg=#ffb86c bold'

# ─────────────────────── Pane Borders ────────────────────
set -g pane-border-style 'fg=#44475a'
set -g pane-active-border-style 'fg=#bd93f9'
set -g pane-border-lines heavy

# Messages
set -g message-style 'fg=#282a36,bg=#f1fa8c,bold'

# ╭─────────────────────────────────────────────────────────╮
# │              Plugins (TPM)                              │
# ╰─────────────────────────────────────────────────────────╯

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect: save/restore sessions across restarts
set -g @resurrect-capture-pane-contents 'on'

# Continuum: auto-save every 15 mins, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Bootstrap TPM (install with: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm)
run '~/.tmux/plugins/tpm/tpm'

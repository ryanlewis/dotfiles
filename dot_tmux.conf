# ╭─────────────────────────────────────────────────────────╮
# │               tmux config — no frameworks               │
# │          Requires: tmux 3.5+, Ghostty, Nerd Font        │
# ╰─────────────────────────────────────────────────────────╯

# ─────────────────────── Terminal ────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:Tc"

# Extended keys (CSI u) so Shift+Enter etc. work in apps like Claude Code
set -g extended-keys on
if-shell "tmux -V | awk '{if ($2+0 >= 3.5) exit 0; else exit 1}'" \
  "set -g extended-keys-format csi-u"
set -as terminal-features 'xterm-ghostty:extkeys'

# ─────────────────────── General ─────────────────────────
set -g mouse on
set -g set-clipboard on
set -g focus-events on
set -g history-limit 50000
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ─────────────────────── Prefix ──────────────────────────
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ──────────────────── Vi Copy Mode ───────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# ──────────────── Prefix Keybindings ─────────────────────
# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Splits (inherit working directory)
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Reload config
bind r source-file ~/.tmux.conf \; display 'Config reloaded'

# ────────────── Prefixless Shortcuts (Ctrl+Alt) ──────────
# Pane navigation (hjkl and arrows)
bind -n C-M-h select-pane -L
bind -n C-M-j select-pane -D
bind -n C-M-k select-pane -U
bind -n C-M-l select-pane -R
bind -n C-M-Left select-pane -L
bind -n C-M-Down select-pane -D
bind -n C-M-Up select-pane -U
bind -n C-M-Right select-pane -R

# Window navigation
bind -n C-M-p previous-window
bind -n C-M-n next-window
# Pane navigation (Alt+Shift+hjkl and arrows)
bind -n M-H select-pane -L
bind -n M-J select-pane -D
bind -n M-K select-pane -U
bind -n M-L select-pane -R
bind -n S-M-Left select-pane -L
bind -n S-M-Down select-pane -D
bind -n S-M-Up select-pane -U
bind -n S-M-Right select-pane -R
# Window navigation (Alt+Shift+[/])
bind -n 'M-{' previous-window
bind -n 'M-}' next-window
bind -n C-M-c new-window -c '#{pane_current_path}'

# Direct window access
bind -n C-M-1 select-window -t 1
bind -n C-M-2 select-window -t 2
bind -n C-M-3 select-window -t 3
bind -n C-M-4 select-window -t 4
bind -n C-M-5 select-window -t 5
bind -n C-M-6 select-window -t 6
bind -n C-M-7 select-window -t 7
bind -n C-M-8 select-window -t 8
bind -n C-M-9 select-window -t 9

# Pane zoom toggle
bind -n C-M-z resize-pane -Z

# Session picker
bind -n C-M-s choose-tree -Zs

# Popup terminal
bind -n C-M-g display-popup -E -w 80% -h 80%

# ──────────────── Mobile / Terminus ──────────────────────
# Ctrl+_ to Shift+Tab (Terminus on iPhone with Claude Code)
bind-key -n C-_ send-keys BTab

# ╭─────────────────────────────────────────────────────────╮
# │                   Status Bar — Dracula                   │
# ╰─────────────────────────────────────────────────────────╯

set -g status-position top
set -g status-interval 5
set -g status-justify left

# Colours
set -g status-style 'bg=#282a36,fg=#f8f8f2'
set -g status-left-length 30
set -g status-right-length 60

# Left: session name (switches to red PREFIX indicator when prefix is held)
set -g status-left '#{?client_prefix,#[fg=#282a36]#[bg=#ff5555]#[bold]  PREFIX #[fg=#ff5555]#[bg=#282a36],#[fg=#282a36]#[bg=#bd93f9]#[bold]  #S #[fg=#bd93f9]#[bg=#282a36]}'

# Right: prefix hint + clock
set -g status-right '#{?window_zoomed_flag,#[fg=#f1fa8c]  ,}#[fg=#6272a4]%H:%M '

# Window tabs
set -g window-status-separator ''
setw -g window-status-format '#[fg=#6272a4]  #I #W  '
setw -g window-status-current-format '#[fg=#282a36,bg=#50fa7b]#[fg=#282a36,bg=#50fa7b,bold]  #I #W  #[fg=#50fa7b,bg=#282a36]'
setw -g window-status-activity-style 'fg=#ffb86c bold'

# ─────────────────────── Pane Borders ────────────────────
set -g pane-border-style 'fg=#44475a'
set -g pane-active-border-style 'fg=#bd93f9'
set -g pane-border-lines heavy

# Messages
set -g message-style 'fg=#282a36,bg=#f1fa8c,bold'
